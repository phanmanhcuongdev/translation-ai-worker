apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-translation-worker
  labels:
    app: ai-translation-worker
spec:
  # Keep one replica for NVIDIA 1050 Ti 4GB. PostgreSQL advisory lock still
  # protects the GPU if this is accidentally scaled up.
  replicas: 1
  selector:
    matchLabels:
      app: ai-translation-worker
  template:
    metadata:
      labels:
        app: ai-translation-worker
    spec:
      containers:
        - name: ai-translation-worker
          image: ai-translation-worker:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-translation-worker-env
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
